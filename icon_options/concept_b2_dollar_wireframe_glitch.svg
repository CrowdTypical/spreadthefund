<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5CC"/>
      <stop offset="100%" style="stop-color:#42A5F5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0A0E14"/>

  <!-- $ sign as outline/wireframe style — thin stroked lines, no fill -->
  <!-- Vertical stroke top -->
  <line x1="256" y1="70" x2="256" y2="140" stroke="#00E5CC" stroke-width="4"/>
  <!-- Top arc (blocky) -->
  <polyline points="340,150 340,130 170,130 170,200 340,200" 
            stroke="#00E5CC" stroke-width="4" fill="none"/>
  <!-- Middle bar connection -->
  <polyline points="340,200 340,270 170,270 170,340 340,340"
            stroke="#00E5CC" stroke-width="4" fill="none"/>
  <!-- Vertical stroke bottom -->
  <line x1="256" y1="330" x2="256" y2="400" stroke="#00E5CC" stroke-width="4"/>

  <!-- Glitch: entire middle section duplicated and displaced -->
  <!-- Displaced chunk (shifted right 20px, rows 195-215) -->
  <rect x="0" y="195" width="512" height="25" fill="#0A0E14"/>
  <polyline points="360,205 360,200 190,200 190,210"
            stroke="#FF4C5E" stroke-width="4" fill="none" opacity="0.8"/>
  <polyline points="340,205 340,200 170,200 170,210"
            stroke="#00E5CC" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Displaced chunk 2 (shifted left, rows 260-280) -->
  <rect x="0" y="258" width="512" height="24" fill="#0A0E14"/>
  <polyline points="320,268 320,272 150,272 150,262"
            stroke="#FF4C5E" stroke-width="4" fill="none" opacity="0.7"/>
  <polyline points="342,268 342,272 172,272 172,262"
            stroke="#42A5F5" stroke-width="3" fill="none" opacity="0.4"/>

  <!-- Noise / static pixels scattered around the $ -->
  <g opacity="0.5">
    <!-- Top region -->
    <rect x="180" y="100" width="2" height="2" fill="#00E5CC"/>
    <rect x="320" y="108" width="3" height="2" fill="#FF4C5E"/>
    <rect x="200" y="115" width="2" height="3" fill="#42A5F5"/>

    <!-- Mid region -->
    <rect x="360" y="220" width="4" height="2" fill="#FF4C5E"/>
    <rect x="370" y="224" width="2" height="2" fill="#00E5CC"/>
    <rect x="145" y="230" width="3" height="3" fill="#FF4C5E"/>
    <rect x="140" y="235" width="2" height="2" fill="#42A5F5"/>

    <!-- Lower -->
    <rect x="350" y="290" width="3" height="2" fill="#00E5CC"/>
    <rect x="160" y="310" width="4" height="2" fill="#FF4C5E"/>
    <rect x="355" y="330" width="2" height="3" fill="#42A5F5"/>
  </g>

  <!-- Horizontal scan artifact lines -->
  <rect x="0" y="160" width="512" height="1" fill="#00E5CC" opacity="0.08"/>
  <rect x="0" y="230" width="512" height="1" fill="#FF4C5E" opacity="0.1"/>
  <rect x="0" y="300" width="512" height="1" fill="#00E5CC" opacity="0.08"/>
  <rect x="0" y="350" width="512" height="1" fill="#FF4C5E" opacity="0.06"/>

  <!-- Terminal cursor blink at bottom right -->
  <rect x="380" y="420" width="14" height="3" fill="#00E5CC" opacity="0.8"/>

  <!-- Monospace subtext -->
  <text x="256" y="460" font-family="monospace" font-size="14" font-weight="bold"
        fill="#556677" text-anchor="middle" letter-spacing="6">SPREAD THE FUNDS</text>
</svg>