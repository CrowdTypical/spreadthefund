name: bill_splitter
description: A bill splitting app with real-time updates between users.
publish_to: 'none'

version: 1.0.4+4

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.6.0
  google_sign_in: ^6.1.0
  intl: ^0.19.0
  provider: ^6.1.0
  cloud_functions: ^4.5.0
  http: ^1.2.0
  image_picker: ^1.2.1
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  flutter_svg: ^2.0.10+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/glitch_dollar_icon.png"
  adaptive_icon_background: "#0A0E14"
  adaptive_icon_foreground: "assets/glitch_dollar_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/app_icon_transparent.png
